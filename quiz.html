<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Brusque</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            overflow: hidden;
        }



        .screen {
            width: 100vw;
            height: 100vh;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-size: cover;
            background-position: center;
        }

        .active {
            display: flex;
        }



        #home {
            background-image: url("./img/inicio.png");
            background-size: contain;

        }

        #nome,
        #escola,
        #idade {
            background: transparent;
            border: 4px solid #ad7f00;
            color: bla;
            font-weight: bold;
        }

        .card {
            width: 400px;
            background: rgb(251, 239, 193);
            border-radius: 40px;
            padding: 40px;
            margin-top: 120px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            border: 6px solid #ad7f00;

        }


        input {
            padding: 18px;
            border-radius: 20px;
            border: none;
            outline: none;
            font-size: 20px;
            background: #f2f2f2;
        }

        button {
            padding: 20px;
            border: none;
            border-radius: 20px;
            font-size: 28px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .startBtn {
            background: #1f7a13;
            color: white;
        }

        .startBtn:hover {
            transform: scale(1.05);
        }



        #quiz {
            background-image: url("./img/fundo1.png");
            background-size: contain;

        }

        .quizBox {
            width: 1100px;
            text-align: center;

        }

        .question {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-weight: bold;
            color: rgb(0, 0, 0);
            padding: 30px 30px;
            border: 6px solid #ad7f00;
            border-radius: 30px;
             background-color: rgb(255, 255, 255);
        }


        .answers {
            display: flex;
            justify-content: center;
            gap: 40px;
            background-size: contain;
        }

        .answer {
            cursor: pointer;
            transition: 0.5s;
            background-size: contain;
        }

        .answer:hover {
            transform: scale(1.05);
        }

        .answer img {
            width: 400px;
            height: 400px;
            object-fit: contain;
            border-radius: 25px;
            border: 8px solid #ad7f00;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            background-color: white;
        }


        #inicio {
            position: fixed;
            bottom: 840px;
            left: 30px;
            display: none;
        }

        #inicio button {
            background: #ad7702;
            color: white;
            border: 2px solid rgb(0, 0, 0);
            padding: 25px 50px;
            border-radius: 20px;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: black;

        }

        #inicio button:hover {
            transform: scale(1.05);
            background: #14540d;
        }



        #final {
            background-image: url("./img/fim.png");
            background-size: contain;
        }

        .finalBox {
            background: rgb(251, 239, 193);
            padding: 60px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            border: 6px solid #ad7f00;
            ;
        }

        .finalBox h1 {
            font-size: 60px;
            margin-bottom: 20px;
            color: #1f7a13;
        }

        .feedback {
            font-size: 35px;
            margin-bottom: 30px;
        }

        .score {
            font-size: 45px;
            color: #003b8f;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>



    <div id="home" class="screen active">

        <div class="card">



            <input type="text" id="nome" placeholder="NOME">
            <input type="text" id="escola" placeholder="ESCOLA">
            <input type="number" id="idade" placeholder="IDADE">

            <button class="startBtn" onclick="startGame()">
                COMEÇAR!
            </button>

        </div>

    </div>



    <div id="quiz" class="screen">

        <div class="quizBox">

            <div class="question" id="question">
                Qual imagem representa Brusque?
            </div>

            <div class="answers" id="answers"></div>

        </div>

    </div>

    <div id="inicio">
        <button onclick="location.reload()">
            VOLTAR AO INÍCIO
        </button>

    </div>



    <div id="final" class="screen">

        <div class="finalBox">


            <div class="feedback" id="feedback"></div>

            <div class="score" id="score"></div>

            <button class="startBtn" onclick="restartGame()">
                JOGAR NOVAMENTE
            </button>

        </div>

    </div>

    <script>

        const questions = [

            {
                question: "COMO SÃO CHAMADAS AS PESSOAS QUE NASCEM EM BRUSQUE?",
                answers: [

                    {
                        image: "./img/brusqueiro.png",
                        correct: false
                    },

                    {
                        image: "./img/brusquense.png",
                        correct: true
                    },

                    {
                        image: "./img/bruscano.png",
                        correct: false
                    }


                ]


            },


            {
                question: "QUAL É A FESTA MAIS FAMOSA DE BRUSQUE?",
                answers: [

                    {
                        image: "./img/fenarreco.png",
                        correct: true
                    },

                    {
                        image: "./img/festadoqueijo.png",
                        correct: false
                    },

                    {
                        image: "./img/festajunina.png",
                        correct: false
                    }


                ]


            },


            {
                question: "QUAL O NOME DO PRINCIPAL MUSEU QUE CONTA A HISTÓRIA DA NOSSA CIDADE?",
                answers: [

                    {
                        image: "./img/museubrusque.png",
                        correct: true
                    },

                    {
                        image: "./img/museubritanico.png",
                        correct: false
                    },

                    {
                        image: "./img/museudolouvre.png",
                        correct: false
                    }


                ]


            },

           

            {
                question: "DE QUE PAÍS VIERAM AS PRIMEIRAS PESSOAS PARA BRUSQUE?",
                answers: [

                    {
                        image: "./img/eua.png",
                        correct: false
                    },

                    {
                        image: "./img/frança.png",
                        correct: false
                    },

                    {
                        image: "./img/alemanha.png",
                        correct: true
                    }


                ]


            },

            {
                question: "QUAL É O MASCOTE DA FENARRECO?",
                answers: [

                    {
                        image: "./img/marreco.png",
                        correct: true
                    },

                    {
                        image: "./img/cachorro.png",
                        correct: false
                    },

                    {
                        image: "./img/gato.png",
                        correct: false
                    }


                ]


            },


             {
                question: "QUAL É O MAIOR  RIO DE BRUSQUE?",
                answers: [

                    {
                        image: "./img/amazonas.png",
                        correct: false
                    },

                    {
                        image: "./img/nilo.png",
                        correct: false
                    },

                    {
                        image: "./img/itajai.png",
                        correct: true
                    }


                ]


            },


            {
                question: "QUAL É O ANIMAL CONHECIDO POR ANDAR NA BEIRA-RIO EM BRUSQUE?",
                answers: [

                    {
                        image: "./img/macaco.png",
                        correct: false
                    },

                    {
                        image: "./img/vaca.png",
                        correct: false
                    },

                    {
                        image: "./img/capivara.png",
                        correct: true
                    }


                ]


            },


            {
                question: "EM BRUSQUE EXISTEM LUGARES PARA BRINCAR COMO?",
                answers: [

                    {
                        image: "./img/aquatico.png",
                        correct: false
                    },

                    {
                        image: "./img/russa.png",
                        correct: false
                    },

                    {
                        image: "./img/parque.png",
                        correct: true
                    }


                ]


            },

            {
                question: "EM  QUE ESTADO FICA A NOSSA CIDADE BRUSQUE?",
                answers: [

                    {
                        image: "./img/santa.png",
                        correct: true
                    },

                    {
                        image: "./img/sao.png",
                        correct: false
                    },

                    {
                        image: "./img/rio.png",
                        correct: false
                    }


                ]


            },

            {
                question: "QUAL É O MAIOR TIME DE FUTEBOL DE BRUSQUE?",
                answers: [

                    {
                        image: "./img/vasco.png",
                        correct: false
                    },

                    {
                        image: "./img/bqfc.png",
                        correct: true
                    },

                    {
                        image: "./img/botafogo.png",
                        correct: false
                    }


                ]


            },

            {
                question: "EM QUE ANO FOI FUNDADA A CIDADE DE BRUSQUE?",
                answers: [

                    {
                        image: "./img/2000.png",
                        correct: false
                    },

                    {
                        image: "./img/1900.png",
                        correct: false
                    },

                    {
                        image: "./img/1860.png",
                        correct: true
                    }


                ]


            },

            {
                question: "QUAL A MAIOR LOJA DE BRUSQUE?",
                answers: [

                    {
                        image: "./img/havan.png",
                        correct: true
                    },

                    {
                        image: "./img/rihappy.png",
                        correct: false
                    },

                    {
                        image: "./img/disney.png",
                        correct: false
                    }


                ]


            },

            {
                question: "BRUSQUE É CONHECIDA POR FAZER O QUE?",
                answers: [

                    {
                        image: "./img/jogos.png",
                        correct: false
                    },

                    {
                        image: "./img/comida.png",
                        correct: false
                    },

                    {
                        image: "./img/roupas.png",
                        correct: true
                    }


                ]


            },

            {
                question: "A FENARRECO FOI PENSADA EM QUAL PAIS?",
                answers: [

                    {
                        image: "./img/espanha.png",
                        correct: false
                    },

                    {
                        image: "./img/frança.png",
                        correct: false
                    },

                    {
                        image: "./img/alemanha.png",
                        correct: true
                    }


                ]


            },

            {
                question: "O QUE TEM NO MAIOR PARQUE DE BRUSQUE?",
                answers: [

                    {
                        image: "./img/esculturas.png",
                        correct: true
                    },

                    {
                        image: "./img/brinquedos.png",
                        correct: false
                    },

                    {
                        image: "./img/carros.png",
                        correct: false
                    }


                ]


            },













        ];

        let currentQuestion = 0;
        let score = 0;

        function startGame() {

            document.getElementById("home").classList.remove("active");
            document.getElementById("quiz").classList.add("active");

            document.getElementById("inicio").style.display = "block";

            loadQuestion();
        }

        function loadQuestion() {

            const q = questions[currentQuestion];

            document.getElementById("question").innerText = q.question;

            const answersDiv = document.getElementById("answers");

            answersDiv.innerHTML = "";

            q.answers.forEach(answer => {

                const div = document.createElement("div");

                div.classList.add("answer");

                div.innerHTML = `
            <img src="${answer.image}">
        `;

                div.onclick = () => checkAnswer(answer.correct);

                answersDiv.appendChild(div);

            });

        }

        function checkAnswer(correct) {

            if (correct) {
                score++;
            }

            currentQuestion++;

            if (currentQuestion < questions.length) {

                loadQuestion();

            } else {

                showFinal();

            }

        }

        function showFinal() {

            document.getElementById("quiz").classList.remove("active");
            document.getElementById("final").classList.add("active");

            document.getElementById("score").innerText =
                `PONTUAÇÃO: ${score}/${questions.length}`;

            let feedback = "";

            if (score === questions.length) {

                feedback = "MUITO BEM!";

            } else if (score > 10) {

                feedback = "MUITO BEM!";

            } else {

                feedback = "QUASE LÁ, TENTE DE NOVO!";

            }

            document.getElementById("feedback").innerText = feedback;

        }

        function restartGame() {

            currentQuestion = 0;
            score = 0;

            document.getElementById("final").classList.remove("active");
            document.getElementById("home").classList.add("active");

            document.getElementById("inicio").style.display = "none";


        }

    </script>

</body>

</html>
